<!DOCTYPE html>
<html>
<head>
    <title>Event Registration</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body class="bg-blur">

<header class="text-center text-white p-3">
    <h2>Event Registration</h2>
</header>

<section class="container d-flex justify-content-center align-items-center vh-100">

<div class="card p-4 shadow form-container" style="width: 400px;">

<h4 class="text-center mb-3">Register</h4>

<form id="regForm" method="POST" action="/submit">

<div class="mb-3">
<label>Name</label>
<input type="text" class="form-control" name="name" id="name">
</div>

<div class="mb-3">
<label>Email</label>
<input type="text" class="form-control" name="email" id="email">
</div>

<div class="mb-3">
<label>Select Event</label>
<select class="form-control" name="event" id="event">
<option value="">Choose...</option>
<option>Hackathon</option>
<option>Workshop</option>
<option>Seminar</option>
<option>Tech Fest</option>
</select>
</div>

<button class="btn btn-primary w-100">Register</button>

</form>

</div>

</section>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="{{ url_for('static', filename='js/script.js') }}"></script>

</body>
</html>
