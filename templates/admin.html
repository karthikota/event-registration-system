<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body class="bg-clear">

<div class="container mt-5">

<h2 class="text-center mb-4 text-white">Registered Users</h2>

{% if data %}
<div class="table-responsive">
<table class="table table-striped table-bordered text-center bg-white">
<tr>
<th>ID</th>
<th>Name</th>
<th>Email</th>
<th>Event</th>
</tr>

{% for row in data %}
<tr>
<td>{{ row[0] }}</td>
<td>{{ row[1] }}</td>
<td>{{ row[2] }}</td>
<td>{{ row[3] }}</td>
</tr>
{% endfor %}

</table>
</div>

{% else %}
<div class="alert alert-warning text-center">No registrations yet.</div>
{% endif %}

</div>

</body>
</html>
